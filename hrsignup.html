<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HireMind HR Signup</title>

<link rel="stylesheet" href="hrsignup.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="signup-container">

<div class="signup-header">


<h1>ResumeIQ</h1>

<p>HR Recruitment Portal</p>

</div>


<div class="form-panel">

<h2>Create HR Account</h2>

<form>

<div class="name-fields">

<input type="text" placeholder="First Name" required>

<input type="text" placeholder="Last Name" required>

</div>
<div class="company-fields">
<input type="email" placeholder="Work Email Address" required>

<input type="text" placeholder="Company Name" required>
</div>
<div class="company-fields">
<input type="password" placeholder="Password" required>


</div>
<div class="otp-row">
<input type="text" placeholder="Enter OTP">
<button type="button" class="otp-btn">Send OTP</button>
</div>
<button class="signup-btn">Create Account</button>

<div class="divider">
<span>OR</span>
</div>

<button type="button" class="google-btn">

<img src="images\google-color-svgrepo-com.svg">

Continue with Google

</button>

<p class="login-text">

Already have an account?
<a href="hrlogin.html">Login</a>

</p>

</form>

</div>

</div>

</body>

</html>
