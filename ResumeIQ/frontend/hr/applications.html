<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ResumeIQ — All Applications</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/hr.css"/>
</head>
<body class="hr-theme">
<div class="sb-overlay" id="sbOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-topbar"><div class="sb-brand"><span class="sb-brand-name">ResumeIQ</span></div><button class="sb-close-btn" id="sbCloseBtn"><i class="fa-solid fa-xmark"></i></button></div>
  <div class="sb-user"><div class="sb-user-av" data-user-initials>H</div><div><div class="sb-user-name" data-user-name>Loading…</div><div class="sb-user-role">Recruiter · Free</div></div></div>
  <nav class="sb-nav">
    <div class="sb-section">Recruiter</div>
    <a class="nav-link" href="index.html"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
    <a class="nav-link" href="jobs.html"><i class="fa-solid fa-briefcase"></i><span>Manage Jobs</span></a>
    <a class="nav-link" href="candidates.html"><i class="fa-solid fa-users"></i><span>Candidates</span></a>
    <a class="nav-link" href="applications.html"><i class="fa-solid fa-file-lines"></i><span>Applications</span></a>
    <a class="nav-link" href="post-job.html"><i class="fa-solid fa-plus-circle"></i><span>Post a Job</span></a>
    <div class="sb-section" style="margin-top:8px;">Account</div>
    <a class="nav-link" href="profile.html"><i class="fa-solid fa-circle-user"></i><span>HR Profile</span></a>
    <a class="nav-link danger nav-logout" href="#"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
  </nav>
  <div class="sb-footer"><i class="fa-solid fa-shield-halved" style="margin-right:6px;color:var(--p1)"></i>ResumeIQ v3.0 · HR</div>
</aside>
<div class="shell"><div class="main">
  <header class="topbar">
    <button class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <div class="topbar-center"><div class="topbar-title">All Applications</div><div class="topbar-crumb"><i class="fa-solid fa-house"></i><i class="fa-solid fa-chevron-right"></i>Applications</div></div>
    <div class="topbar-right">
      <button class="theme-btn"><i class="fa-solid fa-sun theme-icon"></i></button>
     
      <div class="tb-avatar"><div class="tb-av-circle" data-user-initials>H</div><span class="tb-av-name" data-user-name>HR</span></div>
    </div>
  </header>
  <main class="page">
    <div class="app-stats-row">
      <div class="card app-stat-card"><div class="app-stat-num" data-stat="total">—</div><div class="app-stat-label">Total</div></div>
      <div class="card app-stat-card"><div class="app-stat-num app-stat-yellow" data-stat="new">—</div><div class="app-stat-label">New Today</div></div>
      <div class="card app-stat-card"><div class="app-stat-num app-stat-green" data-stat="shortlisted">—</div><div class="app-stat-label">Shortlisted</div></div>
      <div class="card app-stat-card"><div class="app-stat-num" data-stat="hired" style="background:linear-gradient(135deg,#10b981,#059669);-webkit-background-clip:text;color:transparent;">—</div><div class="app-stat-label">Hired</div></div>
    </div>
    <div class="app-toolbar" style="margin-bottom:20px;">
      <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="appSearch" placeholder="Search candidate or job…"/></div>
      <select class="filter-select" id="jobFilter"><option value="all">All Jobs</option></select>
      <select class="filter-select" id="statusFilter"><option value="all">All Statuses</option><option value="applied">Applied</option><option value="shortlisted">Shortlisted</option><option value="interview">Interview</option><option value="hired">Hired</option><option value="rejected">Rejected</option></select>
    </div>
    <div class="tbl-wrap">
      <table id="hrAppsTable">
        <thead><tr><th>Candidate</th><th>Job Position</th><th>AI Score</th><th>Status</th><th>Applied</th><th>Actions</th></tr></thead>
        <tbody><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--clr-muted);"><i class="fa-solid fa-spinner fa-spin" style="font-size:22px;"></i></td></tr></tbody>
      </table>
    </div>
    <div class="modal-backdrop" id="statusModal" style="display:none;">
      <div class="modal-box card">
        <div class="modal-head"><span>Update Status</span><button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">New Status</label>
            <select class="form-select" id="modalStatus"><option value="applied">Applied</option><option value="shortlisted">Shortlisted</option><option value="interview">Interview</option><option value="hired">Hired</option><option value="rejected">Rejected</option></select>
          </div>
          <div class="form-group"><label class="form-label">Notes (optional)</label><textarea class="form-textarea" id="modalNotes" placeholder="Feedback for this candidate…"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="saveStatusBtn"><i class="fa-solid fa-check"></i> Save Status</button>
          <button class="btn btn-outline" id="cancelStatusBtn">Cancel</button>
        </div>
      </div>
    </div>
  </main>
</div></div>
<script src="../js/toast.js"></script><script src="../js/api.js"></script><script src="../js/hr-applications.js"></script>
</body></html>
