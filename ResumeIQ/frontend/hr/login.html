<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ResumeIQ — HR Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body class="auth-body hr-auth hr-theme">
<div class="auth-orb auth-orb1"></div>
<div class="auth-orb auth-orb2"></div>
<div class="auth-wrap">
  <a class="auth-back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  <div class="auth-brand" style="background:linear-gradient(135deg,#4f46e5,#06b6d4);-webkit-background-clip:text;color:transparent;">
  
    ResumeIQ
  </div>
  <div class="auth-card card">
    <div class="auth-role-badge auth-role-hr"><i class="fa-solid fa-building-user"></i> HR / Recruiter Portal</div>
    <div class="auth-tabs">
      <button class="auth-tab-btn active" data-tab="login" style="border-bottom-color:#818cf8">Sign In</button>
      <button class="auth-tab-btn" data-tab="register">Register Company</button>
    </div>
    <!-- LOGIN -->
    <div id="loginPanel" class="auth-panel">
      <div class="auth-panel-head"><h2>HR Dashboard</h2><p>Sign in to manage candidates and jobs</p></div>
      <div id="loginError" class="auth-error-msg" style="display:none;"></div>
      <form id="loginForm">
        <div class="form-group"><label class="form-label">Work Email</label><div class="input-icon-wrap"><i class="fa-solid fa-envelope"></i><input class="form-input" type="email" id="loginEmail" placeholder="hr@company.com" required autocomplete="email"/></div></div>
        <div class="form-group"><label class="form-label">Password</label><div class="input-icon-wrap"><i class="fa-solid fa-lock"></i><input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password"/><button type="button" class="pwd-toggle" data-target="loginPassword"><i class="fa-solid fa-eye"></i></button></div></div>
        <button type="submit" class="btn btn-primary auth-submit-btn" style="background:linear-gradient(135deg,#4f46e5,#06b6d4);"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
      </form>
      <p class="auth-switch-text">No account? <a class="auth-switch-link" data-switch="register" style="color:#818cf8;">Register your company →</a></p>
    </div>
    <!-- REGISTER -->
    <div id="regPanel" class="auth-panel hidden">
      <div class="auth-panel-head"><h2>Register your company</h2><p>Create an HR account to start hiring</p></div>
      <div id="regError" class="auth-error-msg" style="display:none;"></div>
      <form id="registerForm">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Your Name</label><div class="input-icon-wrap"><i class="fa-solid fa-user"></i><input class="form-input" type="text" id="regName" placeholder="Jane Smith" required/></div></div>
          <div class="form-group"><label class="form-label">Company Name</label><div class="input-icon-wrap"><i class="fa-solid fa-building"></i><input class="form-input" type="text" id="regCompany" placeholder="Acme Corp" required/></div></div>
        </div>
        <div class="form-group"><label class="form-label">Work Email</label><div class="input-icon-wrap"><i class="fa-solid fa-envelope"></i><input class="form-input" type="email" id="regEmail" placeholder="hr@company.com" required/></div></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Password</label><div class="input-icon-wrap"><i class="fa-solid fa-lock"></i><input class="form-input" type="password" id="regPassword" placeholder="Min 6 chars" required/><button type="button" class="pwd-toggle" data-target="regPassword"><i class="fa-solid fa-eye"></i></button></div></div>
          <div class="form-group"><label class="form-label">Confirm</label><div class="input-icon-wrap"><i class="fa-solid fa-lock"></i><input class="form-input" type="password" id="regConfirm" placeholder="Repeat password" required/></div></div>
        </div>
        <button type="submit" class="btn btn-primary auth-submit-btn" style="background:linear-gradient(135deg,#4f46e5,#06b6d4);"><i class="fa-solid fa-building-user"></i> Create HR Account</button>
      </form>
      <p class="auth-switch-text">Already registered? <a class="auth-switch-link" data-switch="login" style="color:#818cf8;">Sign in →</a></p>
    </div>
  </div>
  <div class="auth-footer"><button class="auth-theme-btn" id="authThemeBtn"><i class="fa-solid fa-moon theme-icon"></i></button><i class="fa-solid fa-shield-halved" style="color:#818cf8;margin-right:4px;"></i>ResumeIQ v3.0 · Secured</div>
</div>
<script src="../js/toast.js"></script><script src="../js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(Auth.isLoggedIn()&&Auth.isHR()){window.location.href='index.html';return;}
  document.querySelectorAll('.auth-tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.auth-tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const t=btn.dataset.tab;document.getElementById('loginPanel').classList.toggle('hidden',t!=='login');document.getElementById('regPanel').classList.toggle('hidden',t!=='register');});});
  document.querySelectorAll('.auth-switch-link').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();const t=a.dataset.switch;document.querySelectorAll('.auth-tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.getElementById('loginPanel').classList.toggle('hidden',t!=='login');document.getElementById('regPanel').classList.toggle('hidden',t!=='register');});});
  document.querySelectorAll('.pwd-toggle').forEach(btn=>{btn.addEventListener('click',()=>{const inp=document.getElementById(btn.dataset.target);const ic=btn.querySelector('i');inp.type=inp.type==='password'?'text':'password';ic.className=inp.type==='text'?'fa-solid fa-eye-slash':'fa-solid fa-eye';});});
  document.getElementById('loginForm').addEventListener('submit',async function(e){e.preventDefault();const btn=this.querySelector('[type="submit"]');const orig=btn.innerHTML;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Signing in…';btn.disabled=true;const res=await AuthAPI.login(document.getElementById('loginEmail').value.trim(),document.getElementById('loginPassword').value,'hr');btn.disabled=false;btn.innerHTML=orig;if(res.success){Auth.save(res,'hr');showToast(`Welcome, ${res.name.split(' ')[0]}! 👋`,'success');setTimeout(()=>window.location.href='index.html',900);}else{const e=document.getElementById('loginError');e.textContent=res.error||'Login failed';e.style.display='block';showToast(res.error||'Login failed','error');}});
  document.getElementById('registerForm').addEventListener('submit',async function(e){e.preventDefault();const btn=this.querySelector('[type="submit"]');const orig=btn.innerHTML;const pwd=document.getElementById('regPassword').value;if(pwd!==document.getElementById('regConfirm').value){showToast('Passwords do not match','error');return;}btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Creating…';btn.disabled=true;const res=await AuthAPI.register(document.getElementById('regName').value.trim(),document.getElementById('regEmail').value.trim(),pwd,'hr',document.getElementById('regCompany').value.trim());btn.disabled=false;btn.innerHTML=orig;if(res.success){Auth.save(res,'hr');showToast(`HR account created! Welcome, ${res.name.split(' ')[0]}! 🎉`,'success');setTimeout(()=>window.location.href='index.html',1000);}else{const e=document.getElementById('regError');e.textContent=res.error||'Registration failed';e.style.display='block';showToast(res.error||'Registration failed','error');}});
  document.getElementById('authThemeBtn')?.addEventListener('click',toggleTheme);
});
</script>
</body></html>
