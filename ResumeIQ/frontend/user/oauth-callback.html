<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ResumeIQ — Signing you in…</title>
  <link rel="stylesheet" href="../css/global.css"/>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg1);color:var(--clr-muted);font-family:var(--ff,'Plus Jakarta Sans',sans-serif);">
  <div style="text-align:center;padding:24px;">
    <p id="msg" style="font-size:15px;">Completing Google sign-in…</p>
  </div>
  <script src="../js/api.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const msg = document.getElementById("msg");
      if (!code) {
        msg.textContent = "Missing sign-in code. Redirecting…";
        setTimeout(() => { location.href = "login.html?oauth=missing"; }, 800);
        return;
      }
      const res = await AuthAPI.oauthComplete(code);
      if (res.success && res.user_id) {
        Auth.save(res, "user");
        if (res.email) localStorage.setItem("riq_email", res.email);
        location.replace("index.html");
        return;
      }
      msg.textContent = res.error || "Sign-in failed. Redirecting…";
      setTimeout(() => {
        location.href = "login.html?oauth=" + encodeURIComponent(res.error || "fail");
      }, 1200);
    })();
  </script>
</body>
</html>
