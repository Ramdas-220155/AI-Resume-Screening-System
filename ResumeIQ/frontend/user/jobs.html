<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ResumeIQ — Browse Jobs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/jobs.css"/>
</head>
<body>
<div class="sb-overlay" id="sbOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-topbar"><div class="sb-brand"><span class="sb-brand-name">ResumeIQ</span></div><button class="sb-close-btn" id="sbCloseBtn"><i class="fa-solid fa-xmark"></i></button></div>
  <div class="sb-user"><div class="sb-user-av" data-user-initials>U</div><div><div class="sb-user-name" data-user-name>Loading…</div><div class="sb-user-role">Job Seeker · Free</div></div></div>
  <nav class="sb-nav">
    <div class="sb-section">Navigation</div>
    <a class="nav-link" href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a class="nav-link" href="jobs.html"><i class="fa-solid fa-briefcase"></i><span>Browse Jobs</span></a>
    <a class="nav-link" href="applications.html"><i class="fa-solid fa-file-lines"></i><span>My Applications</span></a>
    <a class="nav-link" href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
    <div class="sb-section" style="margin-top:8px;">Account</div>
    <a class="nav-link danger nav-logout" href="#"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
  </nav>
  <div class="sb-footer"><i class="fa-solid fa-shield-halved" style="margin-right:6px;color:var(--p1)"></i>ResumeIQ v3.0</div>
</aside>
<div class="shell"><div class="main">
  <header class="topbar">
    <button class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <div class="topbar-center"><div class="topbar-title">Browse Jobs</div><div class="topbar-crumb"><i class="fa-solid fa-house"></i><i class="fa-solid fa-chevron-right"></i>Jobs</div></div>
    <div class="topbar-right">
      <button class="theme-btn"><i class="fa-solid fa-sun theme-icon"></i></button>
      <button class="tb-notif" id="notifBtn"><i class="fa-solid fa-bell"></i><span class="notif-dot"></span></button>
      <div class="tb-avatar"><div class="tb-av-circle" data-user-initials>U</div><span class="tb-av-name" data-user-name>User</span></div>
    </div>
  </header>
  <main class="page">
    <div class="jobs-toolbar">
      <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="jobSearch" placeholder="Search title, company, skill…"/></div>
      <select class="filter-select" id="typeFilter"><option value="all">All Types</option><option value="full-time">Full-time</option><option value="remote">Remote</option><option value="internship">Internship</option><option value="part-time">Part-time</option><option value="contract">Contract</option></select>
      <select class="filter-select" id="locFilter"><option value="all">All Locations</option><option value="Hyderabad">Hyderabad</option><option value="Bangalore">Bangalore</option><option value="Mumbai">Mumbai</option><option value="Pune">Pune</option><option value="Chennai">Chennai</option><option value="Delhi">Delhi</option><option value="Remote">Remote</option></select>
      <select class="filter-select" id="levelFilter"><option value="all">All Levels</option><option value="intern">Intern</option><option value="junior">Junior</option><option value="mid">Mid-level</option><option value="senior">Senior</option></select>
      <span id="resultCount" class="result-count">Loading…</span>
    </div>
    <div class="jobs-grid" id="jobsGrid"></div>
  </main>
</div></div>
<div class="chatbot-float"><div class="chatbot-tip">AI Assistant</div><button class="chatbot-bubble"><i class="fa-solid fa-message"></i></button></div>
<script src="../js/toast.js"></script><script src="../js/api.js"></script><script src="../js/jobs.js"></script>
</body></html>
